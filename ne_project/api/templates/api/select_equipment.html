{% extends "main.html" %}
{% block content %}
{% load static %}
    <link rel="stylesheet" href="{% static 'api/select_equipment.css' %}">
    <form method="POST" action="/select_equipment/" id="search_form">
        {% csrf_token %}
        <center>
            <label for="search_bar" name="search_value" id="search_label"></label>
            <input id="search_bar" placeholder="Search" name="search_value">
            <button id="search_btn" type="submit" name="search_bar">D</button>
        </center>
    </form>

    <form method="post" action="/select_equipment/">
        {% csrf_token %}
    <div id="equipement_container">
        {% for equipment in equipments %}
        <input type = "checkbox" value="{{equipment.id}}" name="{{equipment.id}}" id="{{equipment.id}}" class="equipment_card_box">
        <label for="{{equipment.id}}" class="equipment_cards">
        <center>
        <div class="equipment_count">
            {{equipment.workouts.count}}
        </div>
        <div class="equipment_name">
            {{equipment}}
        </div>
        </center>
        </label>
        <input type = "checkbox" value="{{equipment.id}}" name="{{equipment.id}}" id="{{equipment.id}}" class="equipment_card_box">
        {% empty %}
        <div>
            No records exists
        </div>
        {% endfor %}
    </div>
    <button type = "submit" id="donebtn">Done</button>
    <div id="blurbar"></div>
    </form>

<script src="{% static 'api/select_equipment.js' %}"></script>
{% endblock %}
