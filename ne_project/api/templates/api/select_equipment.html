{% extends "main.html" %}
{% block content %}
{% load static %}
    <link rel="stylesheet" href="{% static 'api/select_equipment.css' %}">
    <center><div id="search_bar">Search bar</div></center>

    <form method="post" action="/select_equipment/">
        {% csrf_token %}
    <div id="equipement_container">
        {% for equipment in equipments %}
        <input type = "checkbox" value="{{equipment.id}}" name="{{equipment.id}}" id="{{equipment.id}}" class="equipment_card_box">
        <label for="{{equipment.id}}" class="equipment_cards">
        <center>
        <div class="equipment_count">
            {{equipment.workouts.count}}
        </div>
        <div class="equipment_count">
            {{equipment}}
        </div>
        </center>
        </label>
        <input type = "checkbox" value="{{equipment.id}}" name="{{equipment.id}}" id="{{equipment.id}}" class="equipment_card_box">
        {% empty %}
        <div>
            No records exists
        </div>
        {% endfor %}
    </div>
    <button type = "submit" id="donebtn">Done</button>
    </form>
{% endblock %}
