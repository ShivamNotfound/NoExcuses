{% extends "main.html" %}
{% block content %}
{% load static %}
{% load custom_tags %}
        <link rel="stylesheet" href="{% static 'api/home.css' %}">
        <div>Change equipments</div>
        <div id="workouts_count">You have {{count}} workouts to do</div>

        <div id="container">
            {% for muscle in muscles %}
            <div class="muscles" onclick="window.location.href='{% url 'available_workouts_submuscle' muscle.id  %}'">
                <center>
                <div class="muscle_count">
                    {% get_workout_counts muscle ids %}
                </div>
                <div class="muscle_name">
                    {{muscle}}
                </div>
                </center>
            </div>
            {% endfor %}
        </div>
{% endblock %}
