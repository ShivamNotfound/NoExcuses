

{% extends "main.html" %}
{% block content %}
{% load static %}
    <link rel="stylesheet" href="{% static 'api/home.css' %}">
   <center> <div id="select_equipment_btn" onclick="window.location.href = `{% url 'select_equipment' %}`"> Add Equipment</div> </center>
    <div id="container">
        {% for muscle in muscles %}
        <div class="muscles" onclick = "window.location.href=`{% url 'available_workouts_submuscle' muscle.id %}`">
        <div class="muscle_count">
            {{muscle.workouts.count}}
        </div>
        <div class="muscle_name">
            {{muscle.name}}
        </div>
        </div>
        {% empty %}
        <div>
            No data exists
        </div>
        {% endfor %}
    </div>
{% endblock %}
