{% extends "main.html" %}
{% block content %}
{% load static %}
{% load custom_tags %}
        <link rel="stylesheet" href="{% static 'api/available_workout_submuscle.css' %}">

        <div id="muscle_container">
            {% for submuscle in submuscles %}
            <div id ="{% if submuscle.id == active %}active{% else %} {% endif %}" onclick="window.location.href=`{% url 'available_workouts_submuscle' muscle_id submuscle.id %}`" class="submuscle_card">
            <div class="submuscle_count">
                {% get_workout_counts_submuscle ids submuscle %}
            </div>
            <div class="submuscle_name">{{submuscle}}</div>
            </div>
            {% endfor %} 
        </div>
        <div id="workout_container">
            {% for workout in workouts_selected %}
            <div onclick="window.location.href=`{% url 'workout_page' workout.id %}`" class="workout_cards">
                <center>
                <div class="workout_name">{{workout.name}}</div>
                <div class = "{{workout.difficulty}}">
                </div>
                </center>
            </div>
            {% endfor %}
        </div>
{% endblock %}
