            </div>
            {% endfor %} 
        </div>

    <form method="post" action="/submuscles/{{muscle_id}}/{{current}}/" id="sort_form">
        {% csrf_token %}
        <select type="submit" id="goal" name="option">
            <option value="1" class="goal_item">Hypertrophy</option>
            <option value="2" class="goal_item">Stength</option>
            <option value="3" class="goal_item">Endurance</option>
        </select>
    </form>
        <div id="workout_container">
            {% for workout in workouts_selected %}
            <div onclick="window.location.href=`{% url 'workout_page' workout.id %}`" class="workout_cards">
                <center>
                <div class="workout_name">{{workout.name}}</div>
                <div class = "{{workout.difficulty}}">
                </div>
                </center>
            </div>
            {% endfor %}
        </div>
