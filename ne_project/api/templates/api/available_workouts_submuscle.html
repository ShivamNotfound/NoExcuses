{% extends "main.html" %}
{% block content %}
{% load static %}
{% load custom_tags %}
        <link rel="stylesheet" href="{% static 'api/available_workout_submuscle.css' %}">
        <div id="muscle_container">
            {% for submuscle in submuscles %}
            <div id ="{% if submuscle.id == active %}active{% else %} {% endif %}" onclick="window.location.href=`{% url 'available_workouts_submuscle' muscle_id submuscle.id %}`" class="submuscle_card">
            <div class="submuscle_count">
                {% get_workout_counts_submuscle ids submuscle %}
            </div>
            <div class="submuscle_name">{{submuscle}}</div>
            </div>
            {% endfor %} 
        </div>
    <form method="post" action="/submuscles/{{muscle_id}}/{{current}}/" id="sort_form">
        {% csrf_token %}
        <select id="goal" name="option">
            <option value="0" class="goal_item" {% if select == '0' %}selected{% endif %}>Hypertrophy</option>
            <option value="1" class="goal_item" {% if select == '1' %}selected{% endif %}>Stength</option>
            <option value="2" class="goal_item" {% if select == '2' %}selected{% endif %}>Endurance</option>
        </select>
        <select id="difficulty" name="difficulty">
            <option value="none" class="diff" {% if diff == 0 %}selected{% endif %}>
                None
            </option>
            <option value="eth" class="diff" {% if diff == 1 %}selected{% endif %}>
                Easy to Hard
            </option>
            <option value="hte" class="diff" {% if diff == 2 %}selected{% endif %}>
                Hard to Easy
            </option>
        </select>
    </form>
        <div id="workout_container">
            {% for workout in workouts_selected %}
            <div onclick="window.location.href=`{% url 'workout_page' workout.id %}`" class="workout_cards">
                <center>
                <div class="workout_name">{{workout.name}}</div>
                <div class = "diff{{workout.difficulty}}">
                </div>
                </center>
            </div>
            {% endfor %}
        </div>
<script src="{% static 'api/available_workouts_submuscle.js' %}"></script>
{% endblock %}
