
{% extends "main.html" %}

{% block content %}
{% load static %}
        <link rel="stylesheet" href="{% static 'api/login.css' %}">
        
        <form method="POST" action="/login/">
            {% csrf_token %}
            <div id="form_container">
            <div id="form_title">Register</div>
            <label for="email" id="email_label" class=>Email:</label>
            <input type="email" id="email" name="email" placeholder="Email">
            <label for="password" id="password_label" >Password:</label>
            <input type="password" id="password" name="password" placeholder="Password">
            <div onclick = "window.location.href = '{% url 'login' %}'" id="switch_auth">Login</div>
            <button type="submit" id="done_btn">
                <div>
                    Done
                </div>
                </button>
            </div>
        </form>

{% endblock %}
